<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Revision Hub | Bradley’s Maths</title>
    <!-- Use your existing stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- MathJax Config: Crucial for rendering Paper 2 style questions -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <!-- Stage where the Gate, Menu, and Arena are swapped -->
    <main id="hub-stage" class="container" style="min-height: 60vh; padding-top: 40px;">
        <div style="text-align:center; padding: 50px;">
            <p>Initialising your Revision Coach...</p>
        </div>
    </main>

    <!-- The Engine -->
    <script src="hub-engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialise in 'student' mode
            BradleyHub.init('student');
        });
    </script>

</body>
</html>
