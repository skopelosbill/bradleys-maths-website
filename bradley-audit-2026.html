<!DOCTYPE html>
<html lang="en">
<!-- OVERRIDES (must stay ABOVE <head>) -->
<meta name="page-title" content="Bradley's Maths – 2026 Audit">
<meta name="page-description" content="A full audit of the Bradley's Maths platform for 2026.">
<meta name="page-url" content="https://bradleysmaths.co.uk/bradley-audit-2026.html">
<meta name="page-og-image" content="/images/06/i_28.png">
<meta name="page-type" content="webpage">
<meta name="robots" content="noindex, nofollow">

<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PY6CVXTWP4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PY6CVXTWP4');
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;600&display=swap" rel="stylesheet">

    <!-- Basic SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- DEFAULTS (will be replaced by overrides if present) -->
    <title>Bradley's Maths</title>
    <meta name="description" content="Higher Tier GCSE & IGCSE Maths resources. Worksheets, model answers, and predicted papers.">

    <!-- Canonical (dynamic) -->
    <link id="canonical-link" rel="canonical" href="">

    <!-- Open Graph (dynamic) -->
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:type" content="">
    <meta property="og:url" content="">
    <meta property="og:site_name" content="Bradley's Maths">
    <meta property="og:image" content="">

    <!-- Styles -->
    <link rel="stylesheet" href="/styles.css">

    <!-- MathJax -->
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- JSON-LD container -->
    <script id="jsonld-block" type="application/ld+json"></script>

    <!-- DYNAMIC META SCRIPT -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {

        // Read overrides
        const title = document.querySelector('meta[name="page-title"]')?.content || "Bradley's Maths";
        const desc = document.querySelector('meta[name="page-description"]')?.content || "Higher Tier GCSE & IGCSE Maths resources.";
        const url = document.querySelector('meta[name="page-url"]')?.content || window.location.href;
        const img = document.querySelector('meta[name="page-og-image"]')?.content || "/images/social-preview.png";
        const type = document.querySelector('meta[name="page-type"]')?.content || "webpage";
        const robots = document.querySelector('meta[name="robots"]')?.content || "index, follow";

        // Apply title + description
        document.title = title;
        document.querySelector('meta[name="description"]').setAttribute("content", desc);

        // Canonical
        document.getElementById("canonical-link").setAttribute("href", url);

        // Open Graph
        document.querySelector('meta[property="og:title"]').setAttribute("content", title);
        document.querySelector('meta[property="og:description"]').setAttribute("content", desc);
        document.querySelector('meta[property="og:url"]').setAttribute("content", url);
        document.querySelector('meta[property="og:image"]').setAttribute("content", img);

        // OG type
        const ogType = (type === "article") ? "article" :
                       (type === "homepage") ? "website" :
                       "website";
        document.querySelector('meta[property="og:type"]').setAttribute("content", ogType);

        // Robots (private page)
        const robotsTag = document.querySelector('meta[name="robots"]');
        if (robotsTag) robotsTag.setAttribute("content", robots);

        // JSON-LD generation
        let jsonld = {
          "@context": "https://schema.org",
          "@type": "WebPage",
          "name": title,
          "url": url
        };

        document.getElementById("jsonld-block").textContent = JSON.stringify(jsonld, null, 2);
      });
    </script>

</head>

<body>
    <div class="audit-header" style="background: #f8d7da; padding: 20px; border-bottom: 3px solid #d9534f; text-align: center;">
    <h1 style="margin:0; color: #721c24;">Teacher Audit Mode</h1>
    
    <div class="controls" style="margin-top: 15px;">
        <!-- Tier Switcher -->
        <button class="toggle-btn" onclick="BradleyHub.switchTier('gcse')">GCSE</button>
        <button class="toggle-btn" onclick="BradleyHub.switchTier('igcse')">IGCSE</button>
        
        <!-- NEW: Month Selector -->
        <select id="month-picker" onchange="BradleyHub.loadSpecificMonth(this.value)" style="padding: 8px; border-radius: 4px; border: 1px solid #d9534f; margin-left: 10px;">
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
        </select>
    </div>
</div>

    <main id="hub-container" class="container" style="margin-top: 30px;">
        <!-- Problems will appear here -->
    </main>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        options: {
            ignoreHtmlClass: 'tex2jax_ignore',
            processHtmlClass: 'tex2jax_process'
        }
    };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="hub-engine.js"></script>
    <script>
        // Start in Audit mode
        document.addEventListener('DOMContentLoaded', () => {
            BradleyHub.init('audit');
        });
    </script>
</body>
</html>
