<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Teacher Audit Mode | Bradley’s Maths</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="audit-header" style="background: #f8d7da; padding: 20px; border-bottom: 3px solid #d9534f; text-align: center;">
        <h1 style="margin:0; color: #721c24;">Teacher Preview & Quality Control</h1>
        <p><em>Suspending the "Follow the Sun" rule. All prepared problems are visible.</em></p>
        <div class="tier-switcher" style="margin-top: 15px;">
            <button class="toggle-btn" onclick="BradleyHub.switchTier('gcse')">Preview GCSE</button>
            <button class="toggle-btn" onclick="BradleyHub.switchTier('igcse')">Preview IGCSE</button>
        </div>
    </div>

    <main id="hub-container" class="container" style="margin-top: 30px;">
        <!-- Problems will appear here -->
    </main>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        options: {
            ignoreHtmlClass: 'tex2jax_ignore',
            processHtmlClass: 'tex2jax_process'
        }
    };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="hub-engine.js"></script>
    <script>
        // Start in Audit mode
        document.addEventListener('DOMContentLoaded', () => {
            BradleyHub.init('audit');
        });
    </script>
</body>
</html>
