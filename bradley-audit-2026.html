<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Teacher Audit Mode | Bradley’s Maths</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="audit-header" style="background: #f8d7da; padding: 20px; border-bottom: 3px solid #d9534f; text-align: center;">
    <h1 style="margin:0; color: #721c24;">Teacher Audit Mode</h1>
    
    <div class="controls" style="margin-top: 15px;">
        <!-- Tier Switcher -->
        <button class="toggle-btn" onclick="BradleyHub.switchTier('gcse')">GCSE</button>
        <button class="toggle-btn" onclick="BradleyHub.switchTier('igcse')">IGCSE</button>
        
        <!-- NEW: Month Selector -->
        <select id="month-picker" onchange="BradleyHub.loadSpecificMonth(this.value)" style="padding: 8px; border-radius: 4px; border: 1px solid #d9534f; margin-left: 10px;">
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
        </select>
    </div>
</div>

    <main id="hub-container" class="container" style="margin-top: 30px;">
        <!-- Problems will appear here -->
    </main>
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        options: {
            ignoreHtmlClass: 'tex2jax_ignore',
            processHtmlClass: 'tex2jax_process'
        }
    };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="hub-engine.js"></script>
    <script>
        // Start in Audit mode
        document.addEventListener('DOMContentLoaded', () => {
            BradleyHub.init('audit');
        });
    </script>
</body>
</html>
